<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boss Core Minigame + Shop</title>

<style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        color: white;
    }

    canvas {
        border: 2px solid #333;
        background: #000;
    }

    button {
        position: absolute;
        padding: 10px 15px;
        margin: 5px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #333;
        color: white;
    }

    button:hover {
        background: #555;
    }

    #shopBtn { top: 20px; left: 20px; }
    #fsBtn { top: 20px; left: 100px; }
</style>
</head>
<body>

<button id="shopBtn">Shop</button>
<button id="fsBtn">Fullscreen</button>

<canvas id="game" width="800" height="600"></canvas>

<script>
class BossCoreMinigame {
    constructor(player) {
        this.player = player;

        this.active = false;

        this.layers = [];
        this.currentLayer = 0;

        this.time = 0;
        this.duration = 30000;

        this.weakPoints = [];

        this.coreX = 400;
        this.coreY = 320;

        this.clickCooldown = 0;

        this.damagePopups = [];
    }

    start() {
        this.active = true;
        this.time = 0;
        this.currentLayer = 0;
        this.damagePopups = [];

        this.layers = [
            { name: "Armor Shell", hp: 100, maxHp: 100, resistance: 1.5 },
            { name: "Reinforced Shell", hp: 150, maxHp: 150, resistance: 1.2 },
            { name: "Energy Core", hp: 200, maxHp: 200, resistance: 1.0 },
            { name: "Final Core", hp: 300, maxHp: 300, resistance: 0.8 }
        ];

        this.spawnWeakPoints();
    }

    spawnWeakPoints() {
        this.weakPoints = [];

        const count = 3 + Math.floor(Math.random() * 3);

        for (let i = 0; i < count; i++) {
            this.weakPoints.push({
                x: this.coreX + (Math.random() * 200 - 100),
                y: this.coreY + (Math.random() * 200 - 100),
                radius: 15,
                active: true
            });
        }
    }

    update(dt) {
        if (!this.active) return;

        this.time += dt;
        this.clickCooldown = Math.max(0, this.clickCooldown - dt);

        for (const p of this.damagePopups) {
            p.y -= 0.3 * dt;
            p.life -= dt;
        }
        this.damagePopups = this.damagePopups.filter(p => p.life > 0);

        if (this.time >= this.duration) {
            this.fail();
            return;
        }

        if (Math.random() < 0.01) {
            this.spawnWeakPoints();
        }
    }

    click(x, y) {
        if (!this.active || this.clickCooldown > 0) return;

        this.clickCooldown = 120;

        const layer = this.layers[this.currentLayer];
        if (!layer) return;

        let damage = this.player.upgrades.normalDmg;
        let hitWeak = false;

        for (const wp of this.weakPoints) {
            if (!wp.active) continue;

            const dx = x - wp.x;
            const dy = y - wp.y;

            if (Math.sqrt(dx * dx + dy * dy) < wp.radius) {
                damage = this.player.upgrades.weakDmg;
                wp.active = false;
                hitWeak = true;
                break;
            }
        }

        layer.hp -= damage;
        layer.hp = Math.max(0, layer.hp);

        this.damagePopups.push({
            x,
            y,
            text: "-" + Math.floor(damage),
            life: 600
        });

        if (hitWeak) {
            this.damagePopups.push({
                x,
                y: y - 20,
                text: "WEAK HIT!",
                life: 500
            });
        }

        if (layer.hp <= 0) {
            this.currentLayer++;

            if (this.currentLayer >= this.layers.length) {
                this.finish();
            } else {
                this.spawnWeakPoints();
            }
        }
    }

    finish() {
        this.active = false;

        const reward =
            500 +
            this.layers.length * 250 +
            Math.floor(Math.random() * 250);

        this.player.money += reward;

        alert("💥 CORE DESTROYED! +$" + reward);
    }

    fail() {
        this.active = false;
        alert("⚠️ Core regenerated...");
    }

    render(ctx) {
        if (!this.active) return;

        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, 800, 600);

        const layer = this.layers[this.currentLayer];
        const radius = 90 - this.currentLayer * 12;

        // core
        ctx.fillStyle = "#e74c3c";
        ctx.beginPath();
        ctx.arc(this.coreX, this.coreY, radius, 0, Math.PI * 2);
        ctx.fill();

        // weak points
        for (const wp of this.weakPoints) {
            if (!wp.active) continue;

            ctx.fillStyle = "#2ecc71";
            ctx.beginPath();
            ctx.arc(wp.x, wp.y, wp.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // HP BAR
        const barW = 300;
        const hpPct = layer.hp / layer.maxHp;

        ctx.fillStyle = "#333";
        ctx.fillRect(this.coreX - barW/2, this.coreY - radius - 40, barW, 18);

        ctx.fillStyle = "#ff4d4d";
        ctx.fillRect(this.coreX - barW/2, this.coreY - radius - 40, barW * hpPct, 18);

        ctx.strokeStyle = "white";
        ctx.strokeRect(this.coreX - barW/2, this.coreY - radius - 40, barW, 18);

        // UI
        ctx.fillStyle = "white";
        ctx.font = "16px Arial";

        ctx.fillText("Layer: " + layer.name, 20, 30);
        ctx.fillText("HP: " + Math.floor(layer.hp), 20, 60);
        ctx.fillText("Money: $" + this.player.money, 20, 90);

        // damage numbers
        for (const p of this.damagePopups) {
            ctx.fillStyle = p.text === "WEAK HIT!" ? "#2ecc71" : "#fff";
            ctx.fillText(p.text, p.x, p.y);
        }
    }

    handleClick(x, y) {
        this.click(x, y);
    }
}

// ---------------- GAME STATE ----------------

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player = {
    money: 0,
    upgrades: {
        normalDmg: 10,
        weakDmg: 25
    }
};

const bossCore = new BossCoreMinigame(player);

let state = "menu"; // menu | shop | game
let lastTime = 0;

// ---------------- SHOP ----------------

function openShop() {
    state = "shop";
}

function closeShop() {
    state = "menu";
}

// buttons
document.getElementById("shopBtn").onclick = openShop;

document.getElementById("fsBtn").onclick = () => {
    document.documentElement.requestFullscreen();
};

// ---------------- INPUT ----------------

window.addEventListener("keydown", (e) => {
    if (state === "menu" && e.key.toLowerCase() === "b") {
        state = "game";
        bossCore.start();
    }

    if (state === "shop" && e.key === "Escape") {
        closeShop();
    }
});

canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (state === "game") {
        bossCore.handleClick(x, y);
    }

    if (state === "shop") {
        // upgrade buttons inside canvas
        if (x > 250 && x < 550) {
            if (y > 200 && y < 260 && player.money >= 100) {
                player.money -= 100;
                player.upgrades.normalDmg += 2;
            }

            if (y > 300 && y < 360 && player.money >= 150) {
                player.money -= 150;
                player.upgrades.weakDmg += 5;
            }
        }
    }
});

// ---------------- LOOP ----------------

function loop(t) {
    const dt = t - lastTime;
    lastTime = t;

    ctx.clearRect(0, 0, 800, 600);

    if (state === "game") {
        bossCore.update(dt);
        bossCore.render(ctx);

        ctx.fillStyle = "#fff";
        ctx.fillText("Press Shop button anytime", 550, 30);
    }

    if (state === "menu") {
        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("⛏️ BOSS CORE MINIGAME", 250, 200);
        ctx.fillText("Press B to Start", 300, 260);
        ctx.fillText("Money: $" + player.money, 320, 320);
        ctx.fillText("Open Shop with button ↑", 270, 360);
    }

    if (state === "shop") {
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, 800, 600);

        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("🏪 SHOP", 350, 80);

        ctx.font = "18px Arial";

        ctx.fillText("Upgrade Normal Damage (+2) - $100", 200, 230);
        ctx.fillText("Upgrade Weak Point Damage (+5) - $150", 200, 330);

        ctx.fillText("Click the text to buy", 300, 420);
        ctx.fillText("Press ESC to go back", 300, 460);

        // draw clickable zones
        ctx.strokeStyle = "#555";
        ctx.strokeRect(250, 200, 300, 60);
        ctx.strokeRect(250, 300, 300, 60);
    }

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
