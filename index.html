<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boss Core Minigame</title>

<style>
    body {
        margin: 0;
        background: radial-gradient(circle at center, #1a1a1a, #000);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        color: white;
        overflow: hidden;
    }

    canvas {
        border: 2px solid #333;
        background: #000;
        box-shadow: 0 0 30px rgba(255,255,255,0.1);
    }

    button {
        position: absolute;
        padding: 10px 15px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: linear-gradient(145deg, #2b2b2b, #1a1a1a);
        color: white;
        transition: all 0.15s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    button:hover {
        transform: scale(1.05);
        background: linear-gradient(145deg, #3a3a3a, #222);
    }

    button:active {
        transform: scale(0.95);
    }

    #shopBtn { top: 20px; left: 20px; }
    #fsBtn { top: 20px; left: 100px; }
</style>
</head>

<body>

<button id="shopBtn">🏪 Shop</button>
<button id="fsBtn">⛶ Fullscreen</button>

<canvas id="game" width="800" height="600"></canvas>

<script>
class BossCoreMinigame {
    constructor(player) {
        this.player = player;

        this.active = false;

        this.layers = [];
        this.currentLayer = 0;

        this.time = 0;
        this.duration = 30000;

        this.weakPoints = [];

        this.coreX = 400;
        this.coreY = 320;

        this.clickCooldown = 0;

        this.damagePopups = [];
    }

    start() {
        this.active = true;
        this.time = 0;
        this.currentLayer = 0;
        this.damagePopups = [];

        this.layers = [
            { name: "Armor Shell", hp: 100, maxHp: 100, resistance: 1.5 },
            { name: "Reinforced Shell", hp: 150, maxHp: 150, resistance: 1.2 },
            { name: "Energy Core", hp: 200, maxHp: 200, resistance: 1.0 },
            { name: "Final Core", hp: 300, maxHp: 300, resistance: 0.8 }
        ];

        this.spawnWeakPoints();
    }

    spawnWeakPoints() {
        this.weakPoints = [];

        const count = 3 + Math.floor(Math.random() * 3);

        for (let i = 0; i < count; i++) {
            this.weakPoints.push({
                x: this.coreX + (Math.random() * 200 - 100),
                y: this.coreY + (Math.random() * 200 - 100),
                radius: 15,
                active: true,
                pulse: Math.random() * 10
            });
        }
    }

    update(dt) {
        if (!this.active) return;

        this.time += dt;
        this.clickCooldown = Math.max(0, this.clickCooldown - dt);

        for (const p of this.damagePopups) {
            p.y -= 0.25 * dt;
            p.life -= dt;
        }
        this.damagePopups = this.damagePopups.filter(p => p.life > 0);

        if (this.time >= this.duration) {
            this.fail();
            return;
        }

        if (Math.random() < 0.015) {
            this.spawnWeakPoints();
        }
    }

    click(x, y) {
        if (!this.active || this.clickCooldown > 0) return;

        this.clickCooldown = 110;

        const layer = this.layers[this.currentLayer];
        if (!layer) return;

        let damage = this.player.upgrades.normalDmg;
        let hitWeak = false;

        for (const wp of this.weakPoints) {
            if (!wp.active) continue;

            const dx = x - wp.x;
            const dy = y - wp.y;

            if (Math.sqrt(dx * dx + dy * dy) < wp.radius) {
                damage = this.player.upgrades.weakDmg;
                wp.active = false;
                hitWeak = true;
                break;
            }
        }

        layer.hp -= damage;
        layer.hp = Math.max(0, layer.hp);

        this.damagePopups.push({
            x,
            y,
            text: "-" + Math.floor(damage),
            life: 700
        });

        if (hitWeak) {
            this.damagePopups.push({
                x,
                y: y - 20,
                text: "CRITICAL!",
                life: 600
            });
        }

        if (layer.hp <= 0) {
            this.currentLayer++;

            if (this.currentLayer >= this.layers.length) {
                this.finish();
            } else {
                this.spawnWeakPoints();
            }
        }
    }

    finish() {
        this.active = false;

        const reward =
            500 +
            this.layers.length * 250 +
            Math.floor(Math.random() * 250);

        this.player.money += reward;

        alert("💥 CORE DESTROYED! +$" + reward);
    }

    fail() {
        this.active = false;
        alert("⚠️ Core regenerated...");
    }

    render(ctx) {
        if (!this.active) return;

        // 🌑 background glow
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, 800, 600);

        const layer = this.layers[this.currentLayer];
        const radius = 90 - this.currentLayer * 12;

        // 🔴 core glow
        ctx.shadowColor = "#ff3b3b";
        ctx.shadowBlur = 25;

        ctx.fillStyle = "#e74c3c";
        ctx.beginPath();
        ctx.arc(this.coreX, this.coreY, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;

        // 🟢 weak points (animated pulse)
        for (const wp of this.weakPoints) {
            if (!wp.active) continue;

            wp.pulse += 0.1;

            const pulseSize = wp.radius + Math.sin(wp.pulse) * 2;

            ctx.fillStyle = "#2ecc71";
            ctx.beginPath();
            ctx.arc(wp.x, wp.y, pulseSize, 0, Math.PI * 2);
            ctx.fill();
        }

        // 📊 HP BAR
        const barW = 300;
        const hpPct = layer.hp / layer.maxHp;

        ctx.fillStyle = "#222";
        ctx.fillRect(this.coreX - barW/2, this.coreY - radius - 45, barW, 18);

        ctx.fillStyle = "#ff4d4d";
        ctx.fillRect(this.coreX - barW/2, this.coreY - radius - 45, barW * hpPct, 18);

        ctx.strokeStyle = "#fff";
        ctx.strokeRect(this.coreX - barW/2, this.coreY - radius - 45, barW, 18);

        // 🧠 UI
        ctx.fillStyle = "white";
        ctx.font = "16px Arial";
        ctx.fillText("Layer: " + layer.name, 20, 30);
        ctx.fillText("HP: " + Math.floor(layer.hp), 20, 60);
        ctx.fillText("Money: $" + this.player.money, 20, 90);

        // 💥 damage popups
        for (const p of this.damagePopups) {
            ctx.fillStyle = p.text === "CRITICAL!" ? "#2ecc71" : "#fff";
            ctx.font = "14px Arial";
            ctx.fillText(p.text, p.x, p.y);
        }
    }

    handleClick(x, y) {
        this.click(x, y);
    }
}

// ---------------- GAME STATE ----------------

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player = {
    money: 0,
    upgrades: {
        normalDmg: 10,
        weakDmg: 25
    }
};

const bossCore = new BossCoreMinigame(player);

let state = "menu";

// ---------------- SHOP UI ----------------

const shopUI = {
    hover: null,
    clickAnim: 0
};

// buttons
document.getElementById("shopBtn").onclick = () => state = "shop";
document.getElementById("fsBtn").onclick = () => document.documentElement.requestFullscreen();

// ---------------- INPUT ----------------

window.addEventListener("keydown", (e) => {
    if (state === "menu" && e.key.toLowerCase() === "b") {
        state = "game";
        bossCore.start();
    }

    if (state === "shop" && e.key === "Escape") {
        state = "menu";
    }
});

canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (state === "game") {
        bossCore.handleClick(x, y);
    }

    if (state === "shop") {
        if (x > 200 && x < 600) {
            // normal dmg upgrade
            if (y > 220 && y < 290 && player.money >= 100) {
                player.money -= 100;
                player.upgrades.normalDmg += 2;
            }

            // weak dmg upgrade
            if (y > 330 && y < 400 && player.money >= 150) {
                player.money -= 150;
                player.upgrades.weakDmg += 5;
            }
        }
    }
});

// ---------------- LOOP ----------------

function loop(t) {
    ctx.clearRect(0, 0, 800, 600);

    if (state === "game") {
        bossCore.update(16);
        bossCore.render(ctx);

        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.fillText("🏪 Shop button available", 600, 30);
    }

    if (state === "menu") {
        ctx.fillStyle = "white";
        ctx.font = "26px Arial";
        ctx.fillText("⛏️ BOSS CORE MINIGAME", 240, 200);
        ctx.font = "18px Arial";
        ctx.fillText("Press B to Start", 300, 260);
        ctx.fillText("Money: $" + player.money, 320, 320);
        ctx.fillText("Use Shop button to upgrade", 270, 360);
    }

    if (state === "shop") {
        // background
        ctx.fillStyle = "#0b0b0b";
        ctx.fillRect(0, 0, 800, 600);

        ctx.fillStyle = "#fff";
        ctx.font = "28px Arial";
        ctx.fillText("🏪 SHOP", 350, 80);

        ctx.font = "18px Arial";
        ctx.fillText("Money: $" + player.money, 330, 120);

        // cards
        drawCard(200, 200, "⚔️ Normal Damage", "+2 Damage", "$100");
        drawCard(200, 300, "💥 Weak Point Damage", "+5 Damage", "$150");

        ctx.fillStyle = "#777";
        ctx.font = "14px Arial";
        ctx.fillText("Click cards to upgrade", 310, 450);
        ctx.fillText("ESC to go back", 330, 480);
    }

    requestAnimationFrame(loop);
}

function drawCard(x, y, title, desc, cost) {
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(x, y, 400, 60);

    ctx.strokeStyle = "#333";
    ctx.strokeRect(x, y, 400, 60);

    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText(title, x + 10, y + 25);

    ctx.fillStyle = "#aaa";
    ctx.fillText(desc, x + 10, y + 45);

    ctx.fillStyle = "#4ade80";
    ctx.fillText(cost, x + 320, y + 35);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
